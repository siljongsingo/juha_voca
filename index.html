<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Juha's Voca"/>
<link rel="apple-touch-icon" href="icon.png"/>
<title>Juha's Voca Study</title>
<style>
:root {
  --sat: env(safe-area-inset-top, 44px);
  --sab: env(safe-area-inset-bottom, 20px);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
body { font-family: -apple-system, 'Noto Sans KR', sans-serif; }
button { cursor: pointer; font-family: inherit; }
button:active { opacity: 0.75; }
input { font-family: inherit; }

/* 페이지 */
.page { display: none; height: 100vh; flex-direction: column; overflow: hidden; }
.page.active { display: flex; }

/* 공통 헤더 — 노치 아래로 */
.top-bar {
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 20px;
  padding-top: calc(var(--sat) + 12px);
  z-index: 10;
}

/* 스크롤 영역 */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: calc(var(--sab) + 20px);
}

/* 단어 페이지 고정 영역 */
.words-fixed {
  flex-shrink: 0;
  padding: 0 20px 12px;
}

/* 카드 플립 */
.card-wrap { perspective: 1000px; cursor: pointer; margin-bottom: 20px; }
.card-inner { position: relative; height: 240px; transform-style: preserve-3d; transition: transform 0.48s cubic-bezier(.4,.2,.2,1); }
.card-inner.flipped { transform: rotateY(180deg); }
.card-face {
  position: absolute; inset: 0;
  -webkit-backface-visibility: hidden; backface-visibility: hidden;
  border-radius: 12px;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px;
}
.card-back { transform: rotateY(180deg); }
</style>
</head>
<body>
<div class="page active" id="page-home"></div>
<div class="page" id="page-game"></div>
<div class="page" id="page-words"></div>

const PC={'v':'#3b82f6','n':'#10b981','a':'#f59e0b','ad':'#ef4444','v/n':'#8b5cf6','n/v':'#8b5cf6','a/n':'#f97316','n/a':'#f97316'};
const PL={'v':'동사','n':'명사','a':'형용사','ad':'부사','v/n':'동/명','n/v':'명/동','a/n':'형/명','n/a':'명/형'};
const DK={bg:'#0d1117',card:'#161b22',border:'#30363d',txt:'#e6edf3',sub:'#8b949e',acc:'#7c3aed',acc2:'#db2777',inp:'#21262d',sh:'rgba(0,0,0,0.4)',badge:'#21262d'};
const LT={bg:'#f6f8fa',card:'#ffffff',border:'#d0d7de',txt:'#1f2328',sub:'#57606a',acc:'#6e40c9',acc2:'#bf4b8a',inp:'#f6f8fa',sh:'rgba(31,35,40,0.12)',badge:'#eaeef2'};

let dark=true, week=1, gCards=[], gIdx=0, gFlip=false;
const T=()=>dark?DK:LT;
const shuffle=a=>{const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;};

function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  const el=document.getElementById('page-'+id);
  el.classList.add('active');
  document.body.style.background=T().bg;
  if(id==='home') renderHome();
  if(id==='game') renderGame();
  if(id==='words') renderWords('');
}

// ── HOME ─────────────────────────────────────────

// ── GAME ─────────────────────────────────────────
function buildGame(w){ gCards=shuffle(VOCAB[w]).map(c=>({...c,showEn:Math.random()>0.5})); gIdx=0; gFlip=false; }

function renderGame(){
  const t=T(), c=gCards[gIdx]||{};
  const front=c.showEn?c.en:c.ko, back=c.showEn?c.ko:c.en;

    <div class="scroll-area">

          <h2 style="color:${t.txt};font-size:20px;font-weight:700;margin:0;">Card Game</h2>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:14px;">

          <button onclick="week=2;buildGame(2);renderGame();" style="flex:1;padding:9px 0;background:${week===2?`linear-gradient(135deg,${t.acc},${t.acc2})`:'transparent'};color:${week===2?'#fff':t.sub};border:1px solid ${week===2?'transparent':t.border};border-radius:6px;font-size:13px;font-weight:${week===2?700:400};">Week 2</button>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
          <span style="color:${t.sub};font-size:12px;">${gIdx+1} / ${gCards.length} cards</span>
          <button onclick="buildGame(week);renderGame();" style="background:transparent;border:1px solid ${t.border};color:${t.sub};border-radius:6px;padding:3px 10px;font-size:12px;">🔀 Shuffle</button>
        </div>
        <div style="height:3px;background:${t.border};border-radius:2px;margin-bottom:18px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${t.acc},${t.acc2});border-radius:2px;"></div>
        </div>
        <div class="card-wrap" onclick="gFlip=!gFlip;document.getElementById('ci').classList.toggle('flipped');">
          <div class="card-inner${gFlip?' flipped':''}" id="ci">
            <div class="card-face" style="background:${t.card};border:1px solid ${t.border};box-shadow:0 3px 12px ${t.sh};">
              <span style="background:${t.acc}22;color:${t.acc};border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:16px;">${fL}</span>
              <p style="color:${t.txt};font-size:${c.showEn?'34px':'17px'};font-weight:800;text-align:center;margin:0;line-height:1.3;word-break:keep-all;">${front}</p>
              <p style="color:${t.sub};font-size:11px;margin-top:16px;">Tap to flip 👆</p>
            </div>
            <div class="card-face card-back" style="background:${dark?'#161b22':'#f0f6ff'};border:1px solid ${t.acc}55;box-shadow:0 3px 12px ${t.sh};">
              <span style="background:${t.acc2}22;color:${t.acc2};border-radius:20px;padding:3px 12px;font-size:11px;font-weight:600;margin-bottom:16px;">${bL}</span>
              <p style="color:${t.txt};font-size:${c.showEn?'17px':'26px'};font-weight:800;text-align:center;margin:0;line-height:1.4;word-break:keep-all;">${back}</p>
              <div style="background:${pc}22;color:${pc};border-radius:6px;padding:3px 10px;font-size:11px;font-weight:700;margin-top:14px;">${pl}</div>

        <div style="display:flex;gap:10px;">
          <button onclick="if(gIdx>0){gIdx--;gFlip=false;renderGame();}" ${gIdx===0?'disabled':''} style="flex:1;padding:14px;background:transparent;border:1px solid ${t.border};color:${gIdx===0?t.sub:t.txt};border-radius:8px;font-size:16px;font-weight:700;opacity:${gIdx===0?0.4:1};">← Prev</button>
          <button onclick="if(gIdx<gCards.length-1){gIdx++;gFlip=false;renderGame();}" ${gIdx===gCards.length-1?'disabled':''} style="flex:2;padding:14px;background:${gIdx===gCards.length-1?'transparent':`linear-gradient(135deg,${t.acc},${t.acc2})`};border:${gIdx===gCards.length-1?`1px solid ${t.border}`:'none'};color:${gIdx===gCards.length-1?t.sub:'white'};border-radius:8px;font-size:16px;font-weight:700;opacity:${gIdx===gCards.length-1?0.4:1};">Next →</button>
        </div>
      </div>
    </div>`;
}

// ── WORDS ────────────────────────────────────────
function renderWords(search){
  const t=T();
  const words=VOCAB[week].filter(w=>w.en.toLowerCase().includes(search.toLowerCase())||w.ko.includes(search));
  document.getElementById('page-words').innerHTML=`
    <div class="top-bar" style="background:${t.card};border-bottom:1px solid ${t.border};">
      <button onclick="showPage('home')" style="background:${t.acc}22;border:1px solid ${t.acc}55;color:${t.acc};font-size:14px;font-weight:700;padding:8px 16px;border-radius:8px;">🏠 홈으로</button>
      <button onclick="dark=!dark;renderWords(document.getElementById('srch').value||'');" style="background:transparent;border:1px solid ${t.border};color:${t.sub};border-radius:6px;padding:5px 12px;font-size:13px;">${dark?'☀️ Light':'🌙 Dark'}</button>
    </div>
    <div class="words-fixed" style="background:${t.bg};padding-top:14px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;padding:0 0px;">
        <span style="font-size:20px;">📚</span>
        <h2 style="color:${t.txt};font-size:20px;font-weight:700;margin:0;">Voca~ Voca!!</h2>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <button onclick="week=1;renderWords('');" style="flex:1;padding:9px 0;background:${week===1?`linear-gradient(135deg,${t.acc},${t.acc2})`:'transparent'};color:${week===1?'#fff':t.sub};border:1px solid ${week===1?'transparent':t.border};border-radius:6px;font-size:13px;font-weight:${week===1?700:400};">Week 1</button>
        <button onclick="week=2;renderWords('');" style="flex:1;padding:9px 0;background:${week===2?`linear-gradient(135deg,${t.acc},${t.acc2})`:'transparent'};color:${week===2?'#fff':t.sub};border:1px solid ${week===2?'transparent':t.border};border-radius:6px;font-size:13px;font-weight:${week===2?700:400};">Week 2</button>
      </div>
      <div style="position:relative;margin-bottom:8px;">
        <span style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:${t.sub};font-size:14px;">🔍</span>
        <input id="srch" oninput="renderWords(this.value)" value="${search}" placeholder="단어 검색..." style="width:100%;padding:9px 12px 9px 34px;background:${t.inp};border:1px solid ${t.border};border-radius:8px;color:${t.txt};font-size:14px;outline:none;"/>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:8px;border-bottom:1px solid ${t.border};">
        <span style="color:${t.sub};font-size:12px;">${words.length}개 단어</span>
        <div style="display:flex;gap:5px;">
          ${['v','n','a','ad'].map(p=>`<span style="background:${PC[p]}22;color:${PC[p]};border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;">${PL[p]}</span>`).join('')}
        </div>
      </div>
    </div>
    <div class="scroll-area" style="padding:0 20px;">
      <div style="height:8px;"></div>
      ${words.map(w=>`
        <div style="background:${t.card};border:1px solid ${t.border};border-radius:8px;padding:13px 14px;margin-bottom:7px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 1px 3px ${t.sh};">
          <div style="width:28px;height:28px;background:${t.badge};border-radius:6px;display:flex;align-items:center;justify-content:center;color:${t.sub};font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px;">${w.n}</div>
          <div style="flex:1;">
            <div style="display:flex;align-items:center;flex-wrap:wrap;gap:7px;margin-bottom:5px;">
              <span style="color:${t.txt};font-size:20px;font-weight:800;">${w.en}</span>
              <span style="background:${PC[w.pos]||'#888'}22;color:${PC[w.pos]||'#888'};border-radius:5px;padding:2px 7px;font-size:11px;font-weight:700;">${PL[w.pos]||w.pos}</span>
            </div>
            <div style="color:${t.sub};font-size:14px;line-height:1.6;word-break:keep-all;">${w.ko}</div>
          </div>
        </div>`).join('')}
      <div style="height:20px;"></div>
    </div>`;
}

buildGame(1);
renderHome();
</script>
</body>
</html>
